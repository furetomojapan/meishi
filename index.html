<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Card Viewer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
              mono: ["JetBrains Mono", "ui-monospace"],
            },
          },
        },
      };
    </script>
    <style>
      ::selection { background-color: #000; color: #fff; }
      body { background-color: #f5f5f5; color: #1a1a1a; font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Core Libraries (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { motion, AnimatePresence } = window.Motion;
      const { useState, useEffect } = React;

      /**
       * 【管理者設定】
       *  - パスワード: admin123
       *  - 登録名リスト: ここに画像がある「名前」を追加してください
       **/
      const registeredNames = [
        "ichiro_suzuki",
        "sanae_takaichi"
      ];

      function App() {
        const [variablePart, setVariablePart] = useState(null);
        const [isAdminMode, setIsAdminMode] = useState(false);
        const [passwordInput, setPasswordInput] = useState("");
        const [isLoggedIn, setIsLoggedIn] = useState(false);
        const [error, setError] = useState("");

        // ページ読み込み時にURLをチェック
        useEffect(() => {
          const urlParams = new URLSearchParams(window.location.search);
          const id = urlParams.get('id');
          if (id) {
            setVariablePart(id);
          }
        }, []);

        const handleLogin = (e) => {
          e.preventDefault();
          
          // 前後のスペースを消し、全角があれば半角に変換
          const cleanInput = passwordInput.trim().replace(/[Ａ-Ｚａ-ｚ０-９]/g, (s) => {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
          });

          // "admin123" を Base64変換したものと比較
          if (window.btoa(cleanInput) === "YWRtaW4xMjM=") {
            setIsLoggedIn(true);
            setError("");
            setPasswordInput("");
          } else {
            setError("正しいコードを入力してください");
            setPasswordInput("");
          }
        };

        const selectName = (name) => {
          setVariablePart(name);
          // URLを更新 (?id=名前)
          const newUrl = new URL(window.location.href);
          newUrl.searchParams.set('id', name);
          window.history.pushState({}, '', newUrl);
          setIsAdminMode(false);
        };

        const cardImages = variablePart ? [
          { id: 1, src: `image1_${variablePart}.png`, label: "おもて面" },
          { id: 2, src: `image2_${variablePart}.png`, label: "うら面" },
        ] : [];

        return (
          <div className="min-h-screen p-6 md:p-12">
            <div className="max-w-5xl mx-auto">
              
              {/* Header */}
              <header className="mb-12 flex flex-col md:flex-row justify-between items-center gap-6">
                <div className="flex flex-col items-center md:items-start tracking-tight text-center md:text-left">
                  <h1 className="text-2xl font-light text-neutral-800">Digital Card Viewer</h1>
                  <p className="text-[10px] font-mono text-neutral-400 mt-1 uppercase tracking-widest">
                    {variablePart ? `Viewing: ${variablePart}` : "Management System"}
                  </p>
                </div>
                
                <div className="flex items-center gap-4">
                  <motion.a 
                    href="https://laxuz.xyz/portfolio/"
                    target="_blank"
                    rel="noopener noreferrer"
                    whileHover={{ scale: 1.05 }}
                    whileTap={{ scale: 0.95 }}
                    className="flex items-center gap-2 px-5 py-2.5 bg-black text-white rounded-full text-xs font-medium transition-all shadow-lg hover:shadow-xl"
                  >
                    <span>Portfolio</span>
                  </motion.a>
                  
                  <button 
                    onClick={() => setIsAdminMode(true)}
                    className="text-[10px] font-mono text-neutral-300 hover:text-black transition-colors uppercase tracking-widest border-b border-transparent hover:border-black pb-0.5"
                  >
                    {isLoggedIn ? "Admin Console" : "Admin Login"}
                  </button>
                </div>
              </header>

              <AnimatePresence mode="wait">
                {isAdminMode ? (
                  <motion.div 
                    key="admin-screen"
                    initial={{ opacity: 0, y: 10 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: -10 }}
                    className="flex flex-col items-center justify-center py-10"
                  >
                    {!isLoggedIn ? (
                      <div className="w-full max-w-sm bg-white p-8 rounded-3xl shadow-sm border border-neutral-100">
                        <h2 className="text-xs font-semibold mb-6 text-center text-neutral-400 tracking-widest uppercase">Admin Verification</h2>
                        <form onSubmit={handleLogin} className="space-y-4">
                          <input 
                            type="password" 
                            value={passwordInput}
                            onChange={(e) => setPasswordInput(e.target.value)}
                            placeholder="管理者パスワード"
                            className="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 rounded-xl focus:outline-none focus:border-neutral-400 transition-all text-sm text-center tracking-widest"
                            autoFocus
                          />
                          {error && <p className="text-[10px] text-red-500 text-center">{error}</p>}
                          <button type="submit" className="w-full py-3 bg-black text-white rounded-xl text-xs font-bold uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all">
                            Login
                          </button>
                          <button type="button" onClick={() => setIsAdminMode(false)} className="w-full text-[10px] text-neutral-300 uppercase tracking-widest mt-4">Cancel</button>
                        </form>
                      </div>
                    ) : (
                      <div className="w-full max-w-2xl bg-white p-8 rounded-3xl shadow-sm border border-neutral-100">
                        <div className="flex justify-between items-center mb-10 px-1">
                          <h2 className="text-sm font-medium text-neutral-800">登録済みファイルを選択</h2>
                          <button onClick={() => setIsLoggedIn(false)} className="text-[10px] text-neutral-300 hover:text-red-400 uppercase tracking-widest transition-colors">Logout</button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {registeredNames.map(name => (
                            <button 
                              key={name}
                              onClick={() => selectName(name)}
                              className={`flex items-center justify-between px-5 py-4 rounded-xl border text-sm transition-all ${variablePart === name ? 'bg-neutral-900 text-white border-neutral-900' : 'bg-neutral-50 border-neutral-100 hover:border-neutral-300'}`}
                            >
                              <span>{name}</span>
                              <span className="text-[9px] opacity-40">SELECT</span>
                            </button>
                          ))}
                        </div>
                        <button onClick={() => setIsAdminMode(false)} className="w-full mt-10 py-3 text-[10px] text-neutral-400 uppercase tracking-widest border border-neutral-100 rounded-xl hover:bg-neutral-50">閉じる</button>
                      </div>
                    )}
                  </motion.div>
                ) : !variablePart ? (
                  <motion.div 
                    key="empty-screen"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    className="flex flex-col items-center justify-center py-32 text-center"
                  >
                    <div className="p-10 mb-8 bg-neutral-100/30 rounded-full">
                       <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ddd" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    </div>
                    <h2 className="text-sm text-neutral-300 tracking-[0.2em] uppercase mb-8">Card Viewer Standby</h2>
                    <button 
                      onClick={() => setIsAdminMode(true)}
                      className="px-8 py-3 bg-neutral-100 text-neutral-500 rounded-full text-xs hover:bg-black hover:text-white transition-all active:scale-95"
                    >
                      管理者として選択する
                    </button>
                  </motion.div>
                ) : (
                  <motion.div 
                    key="display-screen"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    className="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14"
                  >
                    {cardImages.map((card, index) => (
                      <motion.div
                        key={card.id}
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: index * 0.1 }}
                        className="group"
                      >
                        <div className="relative aspect-[1.6/1] w-full bg-white rounded-2xl shadow-sm overflow-hidden border border-white transition-all duration-700 group-hover:shadow-2xl group-hover:-translate-y-2">
                          <img 
                            src={card.src} 
                            alt={`Card ${card.label}`}
                            className="w-full h-full object-cover"
                            onError={(e) => {
                              // ファイルが見つからない場合のフォールバック表示
                              e.target.style.display = 'none';
                              e.target.nextSibling.style.display = 'flex';
                            }}
                          />
                          <div className="hidden absolute inset-0 bg-neutral-50 flex-col items-center justify-center p-6 text-center">
                            <p className="text-[10px] text-neutral-300 font-mono mb-2 uppercase tracking-tighter">File not found</p>
                            <p className="text-[11px] text-neutral-400 font-mono break-all">{card.src}</p>
                          </div>
                          <div className="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none" />
                        </div>
                        <div className="mt-5 flex justify-between items-center px-1">
                          <span className="text-[9px] font-mono font-['JetBrains_Mono'] uppercase tracking-[0.3em] text-neutral-400">
                            {card.label}
                          </span>
                          <span className="text-[9px] font-mono font-['JetBrains_Mono'] text-neutral-300">
                            {card.src}
                          </span>
                        </div>
                      </motion.div>
                    ))}
                  </motion.div>
                )}
              </AnimatePresence>

              {/* Footer */}
              <footer className="mt-24 py-10 border-t border-neutral-100">
                <p className="text-[9px] text-neutral-300 font-mono font-['JetBrains_Mono'] uppercase tracking-[0.4em] text-center">
                  © 2026 DIGITAL SHOWCASE
                </p>
              </footer>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
