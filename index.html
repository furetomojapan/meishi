<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUA</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="theme-color" content="#1a1a1a" />
    <!-- OGP (個別カード閲覧時はJSで動的に上書き) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NEXUA" />
    <meta property="og:description" content="人と情報を、あなたのためにつなぐデジタル名刺。" />
    <meta property="og:image" content="https://furetomojapan.github.io/meishi/og_default.png" />
    <meta property="og:url" content="" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://furetomojapan.github.io/meishi/og_default.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=M+PLUS+1p:wght@400;700&family=Sawarabi+Mincho&family=Kosugi+Maru&family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ["Inter","ui-sans-serif","system-ui"], mono: ["JetBrains Mono","ui-monospace"] } } }
      };
    </script>
    <style>
      ::selection { background-color:#000; color:#fff; }
      body { background-color:#f5f5f5; color:#1a1a1a; font-family:'Inter',sans-serif; }
      .flip-container { perspective:1200px; }
      .flip-card { position:relative; width:100%; transform-style:preserve-3d; transition:transform 0.65s cubic-bezier(0.4,0,0.2,1); }
      .flip-card.flipped { transform:rotateY(180deg); }
      .flip-face { backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:translateZ(1px); }
      .flip-face-back { position:absolute; inset:0; transform:rotateY(180deg) translateZ(1px); backface-visibility:hidden; -webkit-backface-visibility:hidden; }
      /* フリップ状態で反対面を強制非表示（backface-visibilityが効かないブラウザ対策） */
      .flip-card.flipped .flip-face { visibility:hidden; }
      .flip-card:not(.flipped) .flip-face-back { visibility:hidden; }
      .sns-select { appearance:none; -webkit-appearance:none; }
      @keyframes flip-hint { 0%,100%{transform:rotateY(0deg) translateZ(1px);} 50%{transform:rotateY(-15deg) translateZ(1px);} }
      .hint-anim { animation:flip-hint 1.2s ease-in-out 0.5s 2; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
