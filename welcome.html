<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デジタル名刺 — 新規登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #fafaf9; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-sm">

    <!-- ロゴ / タイトル -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-black rounded-2xl mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M8 10h8M8 14h4"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold tracking-tight">デジタル名刺</h1>
      <p class="text-xs text-neutral-500 mt-1">無料で始めるスマート名刺</p>
    </div>

    <!-- フォームカード -->
    <div id="form-card" class="bg-white rounded-3xl shadow-sm border border-neutral-100 p-8">
      <h2 class="text-base font-bold mb-1">新規登録</h2>
      <p class="text-xs text-neutral-500 mb-6">メールアドレスを入力すると、<br>あなた専用の名刺URLをお送りします。</p>

      <div class="space-y-3">
        <input
          id="email-input"
          type="email"
          inputmode="email"
          placeholder="your@email.com"
          autocomplete="email"
          class="w-full px-4 py-3.5 bg-neutral-50 border border-neutral-200 rounded-2xl focus:outline-none focus:border-black text-sm transition-colors"
        />
        <p id="error-msg" class="text-xs text-red-500 hidden px-1"></p>
        <button
          id="submit-btn"
          onclick="handleSubmit()"
          class="w-full py-3.5 bg-black text-white rounded-2xl text-sm font-bold tracking-wide hover:bg-neutral-800 active:scale-95 transition-all">
          登録してURLを受け取る
        </button>
      </div>

      <p class="text-[10px] text-neutral-400 text-center mt-5 leading-relaxed">
        登録後、入力したアドレスにURLをお送りします。<br>
        スパムフォルダもご確認ください。
      </p>
    </div>

    <!-- 送信中 -->
    <div id="loading-card" class="hidden bg-white rounded-3xl shadow-sm border border-neutral-100 p-8 text-center">
      <svg class="spinner w-8 h-8 mx-auto mb-4 text-neutral-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
      </svg>
      <p class="text-sm text-neutral-500">登録中...</p>
    </div>

    <!-- 成功 -->
    <div id="success-card" class="hidden bg-white rounded-3xl shadow-sm border border-neutral-100 p-8 text-center">
      <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="text-base font-bold mb-2">登録完了！</h2>
      <p class="text-xs text-neutral-500 mb-5 leading-relaxed">
        メールアドレス宛に<br>名刺URLをお送りしました。<br>
        <span class="text-neutral-400">（スパムフォルダもご確認ください）</span>
      </p>
      <a id="card-link" href="#" target="_blank"
        class="inline-block w-full py-3.5 bg-black text-white rounded-2xl text-sm font-bold tracking-wide hover:bg-neutral-800 active:scale-95 transition-all">
        名刺を開く →
      </a>
      <p class="text-[10px] text-neutral-400 mt-4">初回アクセス時にPINの設定が必要です</p>
    </div>

  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx07AF_mr_J1zVlkNbQ5FcEFDRJNwkhcAUGG71elltc3iusAKUuBvRBWcnriHcZ4NT2/exec";

    function show(id) {
      ["form-card","loading-card","success-card"].forEach(c => {
        document.getElementById(c).classList.toggle("hidden", c !== id);
      });
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function hideError() {
      document.getElementById("error-msg").classList.add("hidden");
    }

    async function handleSubmit() {
      const email = document.getElementById("email-input").value.trim();
      hideError();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError("正しいメールアドレスを入力してください");
        return;
      }

      show("loading-card");

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "self_register", email })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById("card-link").href = data.cardUrl;
          show("success-card");
        } else {
          show("form-card");
          showError(data.error || "エラーが発生しました。もう一度お試しください。");
        }
      } catch {
        show("form-card");
        showError("通信エラーが発生しました。しばらくしてからお試しください。");
      }
    }

    // Enterキーで送信
    document.getElementById("email-input").addEventListener("keydown", e => {
      if (e.key === "Enter") handleSubmit();
    });
  </script>

</body>
</html>
